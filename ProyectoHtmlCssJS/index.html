<!doctype html>
<html lang="en">
  <head>
    <script
      src="https://kit.fontawesome.com/718dcffbc3.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>


  <body class="grid grid-rows-[auto_1fr_auto] h-screen">
    <header class="flex justify-around items-center bg-cyan-700 p-4">

      <a href="#" class="flex flex-col items-center">
        <img src="./images/logo.png" alt="logo empresa" class="w-14" />
        <p class="hidden md:block md:text-base md:font-bold">Tienda de ropa</p>
        <p class="hidden md:block uppercase tracking-widest">Code & Lens</p>
      </a>
      <div>

          type="text"

        />
      </div>
      <div>
        <a href=""><i class="fa-solid fa-cart-shopping text-2xl hover:text-fuchsia-700 duration-300 ease-in-out"></i></a>

    <main>
        <div id="products" class="flex flex-wrap">

    <footer class="flex justify-around bg-cyan-700 p-4 items-center">
      <a href="#" class="flex flex-col items-center">
        <img src="./images/logo.png" alt="logo empresa" class="w-14" />
        <p class="hidden md:block md:text-base md:font-bold">Tienda de ropa</p>
        <p class="hidden md:block uppercase tracking-widest">Code & Lens</p>
      </a>
      <div class="flex">
        <a href="" class="m-2 md:m-4"><i class="fa-brands fa-square-instagram p-1 md:p-4 text-3xl hover:text-fuchsia-600 duration-300 ease-in-out"></i></a>
        <a href="" class="m-2 md:m-4"><i class="fa-brands fa-youtube p-1 md:p-4 text-3xl hover:text-fuchsia-600 duration-300 ease-in-out"></i></a>
        <a href="" class="m-2 md:m-4"><i class="fa-brands fa-tiktok p-1 md:p-4 text-3xl hover:text-fuchsia-600 duration-300 ease-in-out"></i></a>
      </div>
    </footer>
    <script src="./js/script.js"></script>

</html>
